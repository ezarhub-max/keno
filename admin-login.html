<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .login-title {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            margin-bottom: 15px;
        }
        .form-control:focus {
            background: rgba(0,0,0,0.5);
            border-color: #ffc107;
            outline: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #ffc107, #ff9800);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: 600;
            width: 100%;
            color: #1a1a2e;
        }
        .error-msg {
            color: #dc3545;
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="login-title"><i class="fas fa-shield-alt"></i> Admin Login</h3>
        <input type="text" id="username" class="form-control" placeholder="Username" autocomplete="off">
        <input type="password" id="password" class="form-control" placeholder="Password">
        <button class="btn-login" onclick="login()">Login</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorMsg.textContent = 'Please enter username and password';
                return;
            }
            
            try {
                const response = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // ✅ IMPORTANT: Set both flags
                    localStorage.setItem('adminLoggedIn', 'true');
                    localStorage.setItem('adminAuth', 'true');
                    window.location.href = 'admin-members.html';
                } else {
                    errorMsg.textContent = 'Invalid credentials';
                }
            } catch (error) {
                errorMsg.textContent = 'Login failed. Try again.';
            }
        }
        
        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
