<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Admin - Members & Deposits</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 12px;
        }
        .admin-nav {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .admin-nav .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .admin-nav a {
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.1);
        }
        .admin-nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .admin-nav a.active {
            background: linear-gradient(135deg, #ffc107, #ff9800);
            color: #1a1a2e;
        }
        .logout-btn {
            background: #dc3545 !important;
            color: white !important;
        }
        .logout-btn:hover {
            background: #c82333 !important;
        }
        .container { padding: 0; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffc107;
        }
        .stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
        }
        
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 12px;
            color: white;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ffc107, #ff9800);
            color: #1a1a2e;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .card-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: bold;
            color: #ffc107;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-body { padding: 15px; }
        
        .refresh-icon {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .deposit-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 3px solid #ffc107;
        }
        .deposit-amount {
            font-size: 1.3rem;
            font-weight: bold;
            color: #28a745;
        }
        .deposit-info {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            margin: 5px 0;
        }
        .btn-approve {
            background: #28a745;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
            margin-right: 8px;
        }
        .btn-reject {
            background: #dc3545;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
        }
        
        .member-table {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            color: white;
            font-size: 0.8rem;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th { color: #ffc107; }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .modal-title, .modal-body { color: white; }
        .form-control {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 12px;
            color: white;
        }
        
        .delete-btn {
            background: #dc3545;
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            color: white;
            margin-left: 5px;
        }
        .add-btn {
            background: #28a745;
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            color: white;
            margin-right: 5px;
        }
        
        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }
        .toast-notification.error { background: #dc3545; }
        
        @keyframes slideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
        }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .btn-approve, .btn-reject { padding: 6px 12px; font-size: 0.7rem; }
            td, th { font-size: 0.65rem; padding: 6px 4px; }
        }
    </style>
</head>
<body>
    <div class="admin-nav">
        <div class="nav-links">
            <a href="admin-bets.html">Games</a>
            <a href="admin-members.html" class="active">Members</a>
            <a href="admin-withdrawals.html">Withdrawals</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">Total Members</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalBalance">$0</div>
                <div class="stat-label">Total Balance</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingDeposits">0</div>
                <div class="stat-label">Pending Deposits</div>
            </div>
        </div>

        <div class="tab-nav">
            <div class="tab-btn active" onclick="switchTab('deposits')">
                <i class="fas fa-dollar-sign"></i> Deposit Requests
            </div>
            <div class="tab-btn" onclick="switchTab('members')">
                <i class="fas fa-users"></i> Members
            </div>
        </div>

        <div id="depositsTab" class="tab-content active">
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-clock"></i> Pending Deposit Requests</span>
                    <div class="refresh-icon" onclick="loadPendingDeposits()">
                        <i class="fas fa-sync-alt" style="color: white;"></i>
                    </div>
                </div>
                <div class="card-body" id="pendingDepositsList">
                    <div class="empty-state">Loading pending deposits...</div>
                </div>
            </div>
        </div>

        <div id="membersTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-users"></i> All Members</span>
                    <div class="refresh-icon" onclick="loadMembers()">
                        <i class="fas fa-sync-alt" style="color: white;"></i>
                    </div>
                </div>
                <div class="card-body">
                    <div class="member-table">
                        <table class="table table-dark table-hover">
                            <thead>
                                <tr>
                                    <th>Phone</th>
                                    <th>Balance</th>
                                    <th>Total Deposits</th>
                                    <th>Referrals</th>
                                    <th>Joined</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="membersList">
                                <tr><td colspan="6" class="empty-state">Loading members...</td>'9,
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Balance Modal -->
    <div class="modal fade" id="addBalanceModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus-circle"></i> Add Balance</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>User: <strong id="modalUserName"></strong></p>
                    <input type="number" class="form-control" id="addAmount" placeholder="Amount" min="1">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitAddBalance()" style="background:#28a745;">Add Balance</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUserPhone = null;
        let addBalanceModal = null;
        let autoRefreshInterval = null;
        
        // Check admin authentication
        if (!localStorage.getItem('adminLoggedIn') && !localStorage.getItem('adminAuth')) {
            console.log('No admin auth found, redirecting to login');
            window.location.href = 'admin-login.html';
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminAuth');
            window.location.href = 'admin-login.html';
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            toast.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function updateStatNumber(elementId, newValue) {
            const element = document.getElementById(elementId);
            if (element) element.textContent = newValue;
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (tab === 'deposits') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('depositsTab').classList.add('active');
                loadPendingDeposits();
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('membersTab').classList.add('active');
                loadMembers();
            }
        }
        
        async function loadPendingDeposits() {
            console.log('Loading pending deposits...');
            try {
                const response = await fetch('/admin/deposits');
                console.log('Deposits response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const deposits = await response.json();
                console.log('Deposits data:', deposits);
                
                const pending = Array.isArray(deposits) ? deposits.filter(d => d.status === 'pending') : [];
                
                updateStatNumber('pendingDeposits', pending.length);
                
                const container = document.getElementById('pendingDepositsList');
                if (pending.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle"></i> No pending deposits</div>';
                } else {
                    container.innerHTML = pending.map(deposit => `
                        <div class="deposit-item" data-id="${deposit.id}">
                            <div class="d-flex justify-content-between align-items-center flex-wrap">
                                <div>
                                    <div class="deposit-amount">$${parseFloat(deposit.amount).toFixed(2)}</div>
                                    <div class="deposit-info">📱 ${deposit.phone || 'N/A'}</div>
                                    <div class="deposit-info">🆔 TX: ${deposit.transaction_id || 'N/A'}</div>
                                    <div class="deposit-info">📅 ${deposit.created_at ? new Date(deposit.created_at).toLocaleString() : 'N/A'}</div>
                                </div>
                                <div class="mt-2 mt-sm-0">
                                    <button class="btn-approve" onclick="approveDeposit(${deposit.id}, 'approve', '${deposit.phone}', ${deposit.amount})">
                                        ✅ Approve
                                    </button>
                                    <button class="btn-reject" onclick="approveDeposit(${deposit.id}, 'reject')">
                                        ❌ Reject
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading deposits:', error);
                document.getElementById('pendingDepositsList').innerHTML = '<div class="empty-state">Error loading deposits: ' + error.message + '</div>';
            }
        }
        
        async function approveDeposit(depositId, action, phone, amount) {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>';
            
            try {
                const response = await fetch('/admin/approve-deposit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ depositId, action })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast(`Deposit ${action === 'approve' ? 'approved' : 'rejected'}! ${action === 'approve' ? `+$${amount} added to ${phone}` : ''}`);
                    await loadPendingDeposits();
                    await loadMembers();
                    await updateTotalBalance();
                } else {
                    showToast('Error: ' + (data.error || 'Operation failed'), 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
        
        async function updateTotalBalance() {
            try {
                const response = await fetch('/admin/members');
                if (!response.ok) throw new Error('Failed to fetch members');
                const members = await response.json();
                const total = Array.isArray(members) ? members.reduce((sum, m) => sum + parseFloat(m.wallet_balance || 0), 0) : 0;
                updateStatNumber('totalBalance', `$${total.toFixed(2)}`);
                updateStatNumber('totalMembers', Array.isArray(members) ? members.length : 0);
            } catch (error) {
                console.error('Error updating total balance:', error);
            }
        }
        
        async function loadMembers() {
            console.log('Loading members...');
            try {
                const response = await fetch('/admin/members');
                console.log('Members response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const members = await response.json();
                console.log('Members data:', members);
                
                const membersList = Array.isArray(members) ? members : [];
                updateStatNumber('totalMembers', membersList.length);
                
                const total = membersList.reduce((sum, m) => sum + parseFloat(m.wallet_balance || 0), 0);
                updateStatNumber('totalBalance', `$${total.toFixed(2)}`);
                
                const tbody = document.getElementById('membersList');
                if (membersList.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No members found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = membersList.map(member => `
                    <tr>
                        <td>${member.phone || 'N/A'}</td>
                        <td>$${parseFloat(member.wallet_balance || 0).toFixed(2)}</td>
                        <td>$${parseFloat(member.total_deposits || 0).toFixed(2)}</td>
                        <td>${member.total_referrals || 0}</td>
                        <td>${member.created_at ? new Date(member.created_at).toLocaleDateString() : 'N/A'}</td>
                        <td>
                            <button class="add-btn" onclick="openAddBalance('${member.phone}')">
                                <i class="fas fa-plus"></i> Add
                            </button>
                            <button class="delete-btn" onclick="deleteMember('${member.phone}')">
                                <i class="fas fa-trash"></i> Del
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading members:', error);
                document.getElementById('membersList').innerHTML = `<tr><td colspan="6" class="empty-state">Error loading members: ${error.message}</td></tr>`;
            }
        }
        
        function openAddBalance(phone) {
            currentUserPhone = phone;
            document.getElementById('modalUserName').textContent = phone;
            document.getElementById('addAmount').value = '';
            if (!addBalanceModal) {
                addBalanceModal = new bootstrap.Modal(document.getElementById('addBalanceModal'));
            }
            addBalanceModal.show();
        }
        
        async function submitAddBalance() {
            const amount = parseFloat(document.getElementById('addAmount').value);
            
            if (!amount || amount <= 0) {
                showToast('Please enter a valid amount', 'error');
                return;
            }
            
            const submitBtn = event.target;
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Adding...';
            
            try {
                const response = await fetch('/admin/add-balance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: currentUserPhone, amount })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast(`Added $${amount} to ${currentUserPhone}`);
                    if (addBalanceModal) addBalanceModal.hide();
                    await loadMembers();
                    await updateTotalBalance();
                } else {
                    showToast('Error: ' + (data.error || 'Operation failed'), 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Network error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }
        
        async function deleteMember(phone) {
            if (!confirm(`⚠️ Delete member ${phone}?\n\nThis will permanently remove the user and all their data!\nThis action CANNOT be undone!`)) return;
            
            const deleteBtn = event.target;
            const originalText = deleteBtn.innerHTML;
            deleteBtn.disabled = true;
            deleteBtn.innerHTML = '<span class="loading-spinner"></span>';
            
            try {
                const response = await fetch('/admin/delete-member', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast(`Member ${phone} deleted successfully`);
                    await loadMembers();
                    await updateTotalBalance();
                } else {
                    showToast('Error: ' + (data.error || 'Delete failed'), 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Network error. Please try again.', 'error');
            } finally {
                deleteBtn.disabled = false;
                deleteBtn.innerHTML = originalText;
            }
        }
        
        // Auto refresh every 10 seconds
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                if (document.getElementById('depositsTab').classList.contains('active')) {
                    loadPendingDeposits();
                }
                if (document.getElementById('membersTab').classList.contains('active')) {
                    loadMembers();
                }
                updateTotalBalance();
            }, 10000);
        }
        
        // Initial load
        loadPendingDeposits();
        loadMembers();
        updateTotalBalance();
        startAutoRefresh();
        
        window.addEventListener('beforeunload', () => {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        });
    </script>
</body>
</html>
