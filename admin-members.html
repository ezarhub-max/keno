<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin - Members & Deposits</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 12px;
        }
        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar-brand i { color: #ffc107; }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            color: white;
            text-decoration: none;
        }
        .container { padding: 0; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffc107;
        }
        .stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
        }
        
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 12px;
            color: white;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ffc107, #ff9800);
            color: #1a1a2e;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .card-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: bold;
            color: #ffc107;
        }
        .card-body { padding: 15px; }
        
        .deposit-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 3px solid #ffc107;
        }
        .deposit-amount {
            font-size: 1.3rem;
            font-weight: bold;
            color: #28a745;
        }
        .deposit-info {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            margin: 5px 0;
        }
        .btn-approve {
            background: #28a745;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
            margin-right: 8px;
        }
        .btn-reject {
            background: #dc3545;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
        }
        
        .member-table {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            color: white;
            font-size: 0.8rem;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th { color: #ffc107; }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .modal-title, .modal-body { color: white; }
        .form-control {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 12px;
            color: white;
        }
        
        .delete-btn {
            background: #dc3545;
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            color: white;
        }
        .add-btn {
            background: #28a745;
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            color: white;
            margin-right: 5px;
        }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .btn-approve, .btn-reject { padding: 6px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">
            <i class="fas fa-shield-alt"></i>
            <span>Admin Panel</span>
        </div>
        <a href="select.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">Total Members</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalBalance">$0</div>
                <div class="stat-label">Total Balance</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingDeposits">0</div>
                <div class="stat-label">Pending Deposits</div>
            </div>
        </div>

        <div class="tab-nav">
            <div class="tab-btn active" onclick="switchTab('deposits')">
                <i class="fas fa-dollar-sign"></i> Deposit Requests
            </div>
            <div class="tab-btn" onclick="switchTab('members')">
                <i class="fas fa-users"></i> Members
            </div>
        </div>

        <!-- Deposit Requests Tab -->
        <div id="depositsTab" class="tab-content active">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-clock"></i> Pending Deposit Requests
                </div>
                <div class="card-body" id="pendingDepositsList">
                    <div class="text-center" style="color: rgba(255,255,255,0.5);">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Members Tab -->
        <div id="membersTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-users"></i> All Members
                    <button class="btn btn-sm btn-primary float-end" onclick="loadMembers()" style="background:#28a745; border:none; padding:5px 12px;">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
                <div class="card-body">
                    <div class="member-table">
                        <table>
                            <thead>
                                <tr><th>Phone</th><th>Balance</th><th>Deposits</th><th>Referrals</th><th>Joined</th><th>Action</th></tr>
                            </thead>
                            <tbody id="membersList">
                                <tr><td colspan="6" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Balance Modal -->
    <div class="modal fade" id="addBalanceModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus-circle"></i> Add Balance</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>User: <strong id="modalUserName"></strong></p>
                    <input type="number" class="form-control" id="addAmount" placeholder="Amount" min="1">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitAddBalance()" style="background:#28a745;">Add Balance</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUserPhone = null;
        let addBalanceModal = null;
        
        // Check admin auth
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = 'admin-login.html';
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (tab === 'deposits') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('depositsTab').classList.add('active');
                loadPendingDeposits();
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('membersTab').classList.add('active');
                loadMembers();
            }
        }
        
        async function loadPendingDeposits() {
            try {
                const response = await fetch('/admin/deposits');
                const deposits = await response.json();
                const pending = deposits.filter(d => d.status === 'pending');
                
                document.getElementById('pendingDeposits').textContent = pending.length;
                
                const container = document.getElementById('pendingDepositsList');
                if (pending.length === 0) {
                    container.innerHTML = '<div class="text-center" style="color: rgba(255,255,255,0.5);">No pending deposits</div>';
                } else {
                    container.innerHTML = pending.map(deposit => `
                        <div class="deposit-item">
                            <div class="d-flex justify-content-between align-items-center flex-wrap">
                                <div>
                                    <div class="deposit-amount">$${parseFloat(deposit.amount).toFixed(2)}</div>
                                    <div class="deposit-info">📱 ${deposit.phone}</div>
                                    <div class="deposit-info">🆔 TX: ${deposit.transaction_id}</div>
                                    <div class="deposit-info">📅 ${new Date(deposit.created_at).toLocaleString()}</div>
                                </div>
                                <div>
                                    <button class="btn-approve" onclick="approveDeposit(${deposit.id}, 'approve')">
                                        ✅ Approve
                                    </button>
                                    <button class="btn-reject" onclick="approveDeposit(${deposit.id}, 'reject')">
                                        ❌ Reject
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('pendingDepositsList').innerHTML = '<div class="text-center" style="color: rgba(255,255,255,0.5);">Error loading deposits</div>';
            }
        }
        
        async function approveDeposit(depositId, action) {
            try {
                const response = await fetch('/admin/approve-deposit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ depositId, action })
                });
                const data = await response.json();
                
                if (data.success) {
                    alert(`Deposit ${action === 'approve' ? 'approved' : 'rejected'} successfully!`);
                    loadPendingDeposits();
                    loadMembers();
                } else {
                    alert('Error: ' + (data.error || 'Operation failed'));
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        }
        
        async function loadMembers() {
            try {
                const response = await fetch('/admin/members');
                const members = await response.json();
                
                document.getElementById('totalMembers').textContent = members.length;
                
                const totalBal = members.reduce((sum, m) => sum + parseFloat(m.wallet_balance), 0);
                document.getElementById('totalBalance').textContent = `$${totalBal.toFixed(2)}`;
                
                const tbody = document.getElementById('membersList');
                if (members.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No members found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = members.map(member => `
                    <tr>
                        <td>${member.phone}</td>
                        <td>$${parseFloat(member.wallet_balance).toFixed(2)}</td>
                        <td>$${parseFloat(member.total_deposits || 0).toFixed(2)}</td>
                        <td>${member.total_referrals || 0}</td>
                        <td>${new Date(member.created_at).toLocaleDateString()}</td>
                        <td>
                            <button class="add-btn" onclick="openAddBalance('${member.phone}')">
                                <i class="fas fa-plus"></i> Add
                            </button>
                            <button class="delete-btn" onclick="deleteMember('${member.phone}')">
                                <i class="fas fa-trash"></i> Del
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function openAddBalance(phone) {
            currentUserPhone = phone;
            document.getElementById('modalUserName').textContent = phone;
            document.getElementById('addAmount').value = '';
            if (!addBalanceModal) {
                addBalanceModal = new bootstrap.Modal(document.getElementById('addBalanceModal'));
            }
            addBalanceModal.show();
        }
        
        async function submitAddBalance() {
            const amount = parseFloat(document.getElementById('addAmount').value);
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            try {
                const response = await fetch('/admin/add-balance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: currentUserPhone, amount })
                });
                const data = await response.json();
                
                if (data.success) {
                    alert(`Successfully added $${amount} to ${currentUserPhone}`);
                    if (addBalanceModal) addBalanceModal.hide();
                    loadMembers();
                } else {
                    alert('Error: ' + (data.error || 'Operation failed'));
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        }
        
        async function deleteMember(phone) {
            if (!confirm(`⚠️ Are you sure you want to delete member ${phone}?\n\nThis will permanently remove the user and all their data!\n\nThis action CANNOT be undone!`)) {
                return;
            }
            
            try {
                const response = await fetch('/admin/delete-member', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await response.json();
                
                if (data.success) {
                    alert('Member deleted successfully!');
                    loadMembers();
                } else {
                    alert('Error: ' + (data.error || 'Delete failed'));
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        }
        
        // Initial load
        loadPendingDeposits();
        
        // Auto refresh every 10 seconds
        setInterval(() => {
            if (document.getElementById('depositsTab').classList.contains('active')) {
                loadPendingDeposits();
            }
        }, 10000);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
