<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>KENO - Number Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Your existing styles here - keeping them same */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 12px;
            padding-bottom: 80px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .balance {
            background: linear-gradient(135deg, #28a745, #20c997);
            border-radius: 30px;
            padding: 8px 20px;
            text-align: center;
            cursor: pointer;
        }
        .balance-amount { font-size: 1.3rem; font-weight: 800; }
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            max-height: 450px;
            overflow-y: auto;
        }
        .number {
            aspect-ratio: 1;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            color: white;
            transition: all 0.2s;
        }
        .number.selected { background: linear-gradient(135deg, #28a745, #20c997); transform: scale(1.05); }
        .number.drawn { background: linear-gradient(135deg, #ffc107, #ff9800); }
        .number.matched { background: linear-gradient(135deg, #dc3545, #c82333); animation: matchFlash 0.3s ease; }
        @keyframes matchFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); background: #ff6b6b; }
            100% { transform: scale(1); }
        }
        .timer-value { font-size: 2.5rem; font-weight: bold; color: #ffc107; }
        .timer-bar { height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .timer-progress { height: 100%; transition: width 0.1s linear; }
        .drawing-number {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #ffc107;
            z-index: 10000;
            animation: numberPop 0.3s ease;
            border: 2px solid rgba(255,193,7,0.5);
        }
        @keyframes numberPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .bet-item {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .bet-item.won { background: rgba(40,167,69,0.3); border-left: 3px solid #28a745; }
        .bet-item.lost { background: rgba(220,53,69,0.2); border-left: 3px solid #dc3545; }
        .results-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 15px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .results-bar.show { transform: translateY(0); }
        @media (max-width: 768px) {
            .numbers-grid { grid-template-columns: repeat(8, 1fr); gap: 6px; padding: 12px; }
            .number { font-size: 0.8rem; }
            .drawing-number { width: 80px; height: 80px; font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><i class="fas fa-dice" style="font-size: 1.5rem; color: #ffc107;"></i><span style="color: white; margin-left: 10px;">KENO</span></div>
            <div class="balance" onclick="refreshBalance()">
                <div>💰 Balance</div>
                <div class="balance-amount" id="balance">$0.00</div>
            </div>
            <button class="btn btn-outline-light btn-sm" onclick="location.reload()">⟳</button>
        </div>
        
        <div class="timer-card text-center" style="background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 50px; padding: 15px; margin-bottom: 20px;">
            <div class="timer-value" id="timer">30s</div>
            <div class="timer-bar"><div class="timer-progress" id="timerProgress" style="width: 100%; background: linear-gradient(90deg, #28a745, #ffc107, #dc3545);"></div></div>
            <div class="phase-label" id="phaseLabel" style="color: rgba(255,255,255,0.7);">⏱️ BETTING WINDOW</div>
            <div class="status" id="status" style="color: white; font-size: 0.9rem;">Select numbers and add your bets!</div>
        </div>
        
        <div class="numbers-grid" id="numbersGrid"></div>
        
        <div class="bet-controls" style="background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px;">
            <div class="row">
                <div class="col-4"><button class="btn btn-danger w-100" id="minusBtn">-</button></div>
                <div class="col-4"><input type="number" id="betAmount" class="form-control text-center" value="10" min="1"></div>
                <div class="col-4"><button class="btn btn-success w-100" id="plusBtn">+</button></div>
            </div>
            <div class="row mt-2">
                <div class="col-6"><button class="btn btn-warning w-100" id="addBetBtn">Add Bet</button></div>
                <div class="col-6"><button class="btn btn-secondary w-100" id="clearBtn">Clear All</button></div>
            </div>
        </div>
        
        <div class="bets-list" id="betsList" style="background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; max-height: 200px; overflow-y: auto;">
            <div class="text-center text-muted">No bets placed yet</div>
        </div>
        <div class="total text-end mt-2" id="totalDisplay" style="color: white;">Total: $0</div>
    </div>
    
    <div class="results-bar" id="resultsBar">
        <div id="resultsContent"></div>
        <button class="btn btn-sm btn-secondary mt-2" onclick="closeResultsBar()">Close</button>
    </div>

    <script>
        const socket = io();
        const userPhone = localStorage.getItem('userPhone');
        let balance = 0;
        let selectedNumbers = [];
        let bets = [];
        let canBet = true;
        let currentGameId = null;
        
        if (!userPhone) window.location.href = 'login.html';
        
        // Register with socket
        socket.emit('register-user', userPhone);
        socket.on('balance-update', (data) => {
            if (data.newBalance !== undefined) {
                balance = data.newBalance;
                localStorage.setItem('userBalance', balance);
                updateBalanceDisplay();
                showToast('💰 Balance updated: $' + balance.toFixed(2));
            }
        });
        
        async function loadBalance() {
            try {
                const res = await fetch(`/wallet/${userPhone}`);
                const data = await res.json();
                if (data.balance !== undefined) {
                    balance = data.balance;
                    localStorage.setItem('userBalance', balance);
                    updateBalanceDisplay();
                }
            } catch(e) { console.error('Balance error:', e); }
        }
        
        function updateBalanceDisplay() {
            document.getElementById('balance').textContent = `$${balance.toFixed(2)}`;
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:${isError ? '#dc3545' : '#28a745'}; color:white; padding:10px 20px; border-radius:50px; z-index:1000; animation:fadeInOut 2s ease;`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function createNumberGrid() {
            const grid = document.getElementById('numbersGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 80; i++) {
                const btn = document.createElement('button');
                btn.className = 'number';
                btn.textContent = i;
                btn.onclick = () => toggleNumber(i, btn);
                grid.appendChild(btn);
            }
        }
        
        function toggleNumber(num, btn) {
            if (!canBet) { alert('Betting closed!'); return; }
            const idx = selectedNumbers.indexOf(num);
            if (idx === -1) {
                if (selectedNumbers.length >= 10) { alert('Max 10 numbers!'); return; }
                selectedNumbers.push(num);
                btn.classList.add('selected');
            } else {
                selectedNumbers.splice(idx, 1);
                btn.classList.remove('selected');
            }
            document.getElementById('selectedCount').textContent = selectedNumbers.length;
        }
        
        function clearSelection() {
            selectedNumbers = [];
            document.querySelectorAll('.number').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('selectedCount').textContent = '0';
        }
        
        function updateTotal() {
            const total = bets.reduce((s, b) => s + b.amount, 0);
            document.getElementById('totalDisplay').innerHTML = `Total: $${total.toFixed(2)}`;
            document.getElementById('betCount').textContent = bets.length;
        }
        
        function renderBets() {
            const container = document.getElementById('betsList');
            if (bets.length === 0) {
                container.innerHTML = '<div class="text-center text-muted">No bets placed yet</div>';
                return;
            }
            container.innerHTML = bets.map((bet, i) => `
                <div class="bet-item" data-idx="${i}">
                    <button class="remove-bet float-end" data-idx="${i}" style="background:none; border:none; color:#dc3545;">✖</button>
                    <span class="bet-numbers">🎲 ${bet.numbers.join(', ')}</span><br>
                    <small>$${bet.amount.toFixed(2)}</small>
                    <div class="bet-result" id="bet-result-${i}" style="font-size:0.7rem;"></div>
                </div>
            `).join('');
            
            document.querySelectorAll('.remove-bet').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.idx);
                    if (!canBet) { alert('Cannot remove - betting closed!'); return; }
                    bets.splice(idx, 1);
                    updateTotal();
                    renderBets();
                };
            });
        }
        
        document.getElementById('addBetBtn').onclick = () => {
            if (!canBet) { alert('Betting closed!'); return; }
            const amount = parseFloat(document.getElementById('betAmount').value);
            if (selectedNumbers.length === 0) { alert('Select numbers first!'); return; }
            if (isNaN(amount) || amount <= 0) { alert('Enter valid amount!'); return; }
            
            const total = bets.reduce((s, b) => s + b.amount, 0);
            if (total + amount > balance) { alert(`Insufficient balance! Available: $${(balance - total).toFixed(2)}`); return; }
            
            bets.push({ numbers: [...selectedNumbers], amount });
            updateTotal();
            renderBets();
            clearSelection();
        };
        
        document.getElementById('clearBtn').onclick = () => {
            if (!canBet) { alert('Cannot clear - betting closed!'); return; }
            bets = [];
            updateTotal();
            renderBets();
            clearSelection();
        };
        
        document.getElementById('minusBtn').onclick = () => {
            let v = parseFloat(document.getElementById('betAmount').value);
            if (v > 1) document.getElementById('betAmount').value = v - 1;
        };
        document.getElementById('plusBtn').onclick = () => {
            let v = parseFloat(document.getElementById('betAmount').value);
            document.getElementById('betAmount').value = v + 1;
        };
        
        async function submitBets() {
            if (bets.length === 0) return;
            
            document.getElementById('status').innerHTML = '<span class="spinner-border spinner-border-sm"></span> Placing bets...';
            
            for (const bet of bets) {
                try {
                    const res = await fetch('/keno/bet', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            phone: userPhone,
                            selectedNumbers: bet.numbers,  // Frontend uses camelCase
                            betAmount: bet.amount
                        })
                    });
                    const data = await res.json();
                    if (data.success) {
                        balance = data.newBalance;
                        localStorage.setItem('userBalance', balance);
                        updateBalanceDisplay();
                    }
                } catch(e) { console.error('Bet error:', e); }
            }
            document.getElementById('status').innerHTML = '✅ Bets placed! Watching draw...';
        }
        
        async function animateNumbers(numbers) {
            for (let i = 0; i < numbers.length; i++) {
                const num = numbers[i];
                const isMatch = bets.some(b => b.numbers.includes(num));
                const div = document.createElement('div');
                div.className = `drawing-number ${isMatch ? 'matched' : ''}`;
                div.textContent = num;
                document.body.appendChild(div);
                
                const btn = document.querySelector(`.number[data-num="${num}"]`);
                if (btn) {
                    btn.classList.add('drawn');
                    if (isMatch) btn.classList.add('matched');
                }
                
                document.getElementById('status').innerHTML = `🎲 Drawing ${i+1}/${numbers.length}...`;
                await new Promise(r => setTimeout(r, 600));
                div.remove();
                await new Promise(r => setTimeout(r, 100));
            }
        }
        
        async function fetchResults(gameId, drawnNumbers) {
            try {
                const res = await fetch(`/keno/history/${userPhone}`);
                const history = await res.json();
                const roundBets = history.filter(h => h.game_id === gameId);
                const totalBet = bets.reduce((s, b) => s + b.amount, 0);
                const totalWin = roundBets.reduce((s, b) => s + (b.win_amount || 0), 0);
                
                // Update each bet's result
                bets.forEach((bet, idx) => {
                    const match = roundBets.find(r => {
                        const rNumbers = r.selected_numbers;
                        const bNumbers = bet.numbers;
                        return rNumbers && bNumbers && rNumbers.sort().join(',') === bNumbers.sort().join(',');
                    });
                    const resultDiv = document.getElementById(`bet-result-${idx}`);
                    if (resultDiv) {
                        if (match && match.win_amount > 0) {
                            resultDiv.innerHTML = `🏆 Won: +$${match.win_amount.toFixed(2)}`;
                            resultDiv.style.color = '#28a745';
                            document.querySelector(`.bet-item[data-idx="${idx}"]`).classList.add('won');
                        } else {
                            resultDiv.innerHTML = `💸 Lost: -$${bet.amount.toFixed(2)}`;
                            resultDiv.style.color = '#dc3545';
                            document.querySelector(`.bet-item[data-idx="${idx}"]`).classList.add('lost');
                        }
                    }
                });
                
                // Show results bar
                const resultsBar = document.getElementById('resultsBar');
                const netResult = totalWin - totalBet;
                document.getElementById('resultsContent').innerHTML = `
                    <div class="text-center">
                        <strong>${gameId}</strong><br>
                        <span style="font-family:monospace; color:#ffc107;">${drawnNumbers.join(', ')}</span><br>
                        ${totalWin > 0 ? 
                            `<span style="color:#28a745;">🏆 YOU WON! +$${totalWin.toFixed(2)}</span>` : 
                            `<span style="color:#dc3545;">😢 YOU LOST! -$${totalBet.toFixed(2)}</span>`}
                        <br><small>Net: ${netResult >= 0 ? '+' : ''}$${netResult.toFixed(2)}</small>
                    </div>
                `;
                resultsBar.classList.add('show');
                
                await loadBalance();
                
                setTimeout(() => {
                    resultsBar.classList.remove('show');
                    // Clear board for next round
                    bets = [];
                    updateTotal();
                    renderBets();
                    clearSelection();
                    document.querySelectorAll('.number').forEach(btn => btn.classList.remove('drawn', 'matched'));
                }, 5000);
                
            } catch(e) { console.error('Results error:', e); }
        }
        
        async function pollGameState() {
            try {
                const res = await fetch('/keno/state');
                const state = await res.json();
                if (!state.success) return;
                
                currentGameId = state.gameId;
                document.getElementById('timer').textContent = state.timeLeft + 's';
                const percent = (state.timeLeft / 30) * 100;
                document.getElementById('timerProgress').style.width = percent + '%';
                
                if (state.phase === 'betting') {
                    canBet = true;
                    document.getElementById('phaseLabel').innerHTML = '⏱️ BETTING WINDOW';
                    document.getElementById('status').innerHTML = 'Select numbers and add your bets!';
                }
                else if (state.phase === 'drawing') {
                    canBet = false;
                    document.getElementById('phaseLabel').innerHTML = '🎲 DRAWING NUMBERS';
                    document.getElementById('status').innerHTML = 'Numbers are being drawn...';
                    
                    if (bets.length > 0 && !window.betsSubmitted) {
                        window.betsSubmitted = true;
                        await submitBets();
                    }
                    
                    if (state.drawnNumbers && !window.numbersShown) {
                        window.numbersShown = true;
                        await animateNumbers(state.drawnNumbers);
                    }
                }
                else if (state.phase === 'results') {
                    canBet = false;
                    document.getElementById('phaseLabel').innerHTML = '📊 RESULTS';
                    
                    if (state.drawnNumbers && !window.resultsShown) {
                        window.resultsShown = true;
                        await fetchResults(state.gameId, state.drawnNumbers);
                        window.betsSubmitted = false;
                        window.numbersShown = false;
                        window.resultsShown = false;
                    }
                }
            } catch(e) { console.error('Poll error:', e); }
        }
        
        function closeResultsBar() {
            document.getElementById('resultsBar').classList.remove('show');
        }
        
        async function refreshBalance() {
            await loadBalance();
        }
        
        // Initialize
        createNumberGrid();
        loadBalance();
        updateTotal();
        renderBets();
        
        setInterval(pollGameState, 500);
        setInterval(loadBalance, 5000);
        
        window.refreshBalance = refreshBalance;
        window.closeResultsBar = closeResultsBar;
    </script>
</body>
</html>
