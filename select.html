<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>KENO - Number Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 12px;
            padding-bottom: 80px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo i { font-size: 1.5rem; color: #ffc107; }
        .logo span { color: white; font-weight: bold; }
        
        .wallet-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 8px 16px;
            color: white;
            text-decoration: none;
        }
        
        .balance {
            background: linear-gradient(135deg, #28a745, #20c997);
            border-radius: 30px;
            padding: 8px 20px;
            text-align: center;
            cursor: pointer;
        }
        .balance-amount { font-size: 1.2rem; font-weight: 800; }
        .balance small { font-size: 0.65rem; display: block; }
        .balance-update { animation: pulse 0.3s ease; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .game-info {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .game-id-box, .player-box {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px 16px;
            text-align: center;
        }
        .game-id-value, .player-value { font-size: 1.1rem; font-weight: bold; color: #ffc107; font-family: monospace; }
        
        .timer-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 50px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        .timer-value { font-size: 2.5rem; font-weight: bold; color: #ffc107; font-family: monospace; }
        .timer-bar { height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .timer-progress { height: 100%; transition: width 0.1s linear; }
        .phase-label { font-size: 0.8rem; color: rgba(255,255,255,0.7); margin-top: 5px; }
        .status { font-size: 0.85rem; margin-top: 8px; }
        
        .stats { display: flex; gap: 12px; margin-bottom: 15px; flex-wrap: wrap; }
        .stat-card {
            background: rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 10px 15px;
            flex: 1;
            text-align: center;
        }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #ffc107; }
        .stat-label { font-size: 0.7rem; opacity: 0.8; }
        
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .number {
            aspect-ratio: 1;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            color: white;
            transition: all 0.1s;
        }
        .number:active { transform: scale(0.95); }
        .number.selected { background: linear-gradient(135deg, #28a745, #20c997); transform: scale(1.02); }
        .number.drawn { background: linear-gradient(135deg, #ffc107, #ff9800); }
        .number.matched { background: linear-gradient(135deg, #dc3545, #c82333); animation: flash 0.2s ease; }
        
        @keyframes flash {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .bet-controls {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .bet-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2c3e50;
            border-radius: 50px;
            padding: 5px;
        }
        .bet-btn { width: 45px; height: 45px; border: none; border-radius: 50%; font-size: 1.3rem; font-weight: bold; cursor: pointer; }
        .bet-btn.minus { background: #dc3545; color: white; }
        .bet-btn.plus { background: #28a745; color: white; }
        .bet-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            font-weight: bold;
            padding: 8px;
        }
        .add-bet-btn, .clear-btn {
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            width: 100%;
        }
        .add-bet-btn { background: linear-gradient(135deg, #ffc107, #ff9800); border: none; }
        .clear-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: white; }
        
        .bets-list {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .bet-item {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .bet-item.won { background: rgba(40,167,69,0.3); border-left: 3px solid #28a745; }
        .bet-item.lost { background: rgba(220,53,69,0.2); border-left: 3px solid #dc3545; }
        .bet-numbers { font-family: monospace; color: #ffc107; font-weight: bold; }
        .remove-bet { background: none; border: none; color: #dc3545; float: right; cursor: pointer; }
        .bet-result { font-size: 0.7rem; margin-top: 5px; }
        .bet-result.win { color: #28a745; }
        .bet-result.loss { color: #dc3545; }
        
        .total { text-align: right; padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); font-weight: bold; color: white; }
        
        .results-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-top: 1px solid rgba(255,193,7,0.3);
            padding: 12px 16px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .results-bar.show { transform: translateY(0); }
        .results-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .results-numbers { font-family: monospace; font-size: 0.8rem; color: #ffc107; }
        .results-win { color: #28a745; font-weight: bold; }
        .results-lose { color: #dc3545; font-weight: bold; }
        .close-results { position: absolute; top: 5px; right: 10px; background: none; border: none; color: white; cursor: pointer; }
        
        .drawing-number {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffc107;
            z-index: 1000;
            animation: pop 0.3s ease;
            border: 2px solid rgba(255,193,7,0.5);
        }
        .drawing-number.matched { color: #ff6b6b; border-color: rgba(220,53,69,0.5); }
        
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .toast-win, .toast-loss {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            z-index: 2000;
            animation: fade 0.3s ease;
            white-space: nowrap;
        }
        .toast-win { background: linear-gradient(135deg, #28a745, #20c997); color: white; }
        .toast-loss { background: linear-gradient(135deg, #dc3545, #c82333); color: white; }
        
        @keyframes fade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }
        
        @media (max-width: 768px) {
            .numbers-grid { grid-template-columns: repeat(8, 1fr); gap: 6px; padding: 12px; }
            .number { font-size: 0.8rem; }
            .drawing-number { width: 80px; height: 80px; font-size: 2rem; }
        }
        @media (max-width: 480px) {
            .numbers-grid { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-dice"></i>
                <span>KENO</span>
            </div>
            <a href="wallet.html" class="wallet-btn"><i class="fas fa-wallet"></i> Wallet</a>
            <div class="balance" onclick="refreshBalance()">
                <small>💰 BALANCE</small>
                <div class="balance-amount" id="balance">$0.00</div>
            </div>
            <button class="refresh-btn btn btn-outline-light btn-sm" onclick="location.reload()">⟳</button>
        </div>
        
        <div class="game-info">
            <div class="game-id-box">
                <div class="game-id-label">🎮 GAME ID</div>
                <div class="game-id-value" id="gameId">Loading...</div>
            </div>
            <div class="player-box">
                <div class="player-label">👤 PLAYER</div>
                <div class="player-value" id="playerNumber">190782</div>
            </div>
        </div>
        
        <div class="timer-card">
            <div class="timer-value" id="timer">30s</div>
            <div class="timer-bar"><div class="timer-progress" id="timerProgress" style="width: 100%"></div></div>
            <div class="phase-label" id="phaseLabel">⏱️ BETTING WINDOW</div>
            <div class="status" id="status">Select numbers and add your bets!</div>
        </div>
        
        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="selectedCount">0</div><div class="stat-label">Selected / 10</div></div>
            <div class="stat-card"><div class="stat-value" id="betCount">0</div><div class="stat-label">Bets</div></div>
            <div class="stat-card"><div class="stat-value" id="totalWagered">$0</div><div class="stat-label">Wagered</div></div>
        </div>
        
        <div class="numbers-grid" id="numbersGrid"></div>
        
        <div class="bet-controls">
            <div class="row g-2">
                <div class="col-5">
                    <div class="bet-input-group">
                        <button class="bet-btn minus" id="minusBtn">-</button>
                        <input type="number" id="betAmount" class="bet-input" value="10" min="1">
                        <button class="bet-btn plus" id="plusBtn">+</button>
                    </div>
                </div>
                <div class="col-4"><button class="add-bet-btn" id="addBetBtn"><i class="fas fa-plus"></i> ADD</button></div>
                <div class="col-3"><button class="clear-btn" id="clearBtn"><i class="fas fa-trash"></i></button></div>
            </div>
        </div>
        
        <div class="bets-list" id="betsList"><div class="text-center text-muted">No bets yet</div></div>
        <div class="total" id="totalDisplay">Total: $0</div>
    </div>
    
    <div class="results-bar" id="resultsBar">
        <button class="close-results" onclick="closeResultsBar()">✖</button>
        <div class="results-content" id="resultsContent"></div>
    </div>

    <script>
        const socket = io();
        const userPhone = localStorage.getItem('userPhone');
        let balance = 0;
        let selectedNumbers = [];
        let bets = [];
        let canBet = true;
        let currentGameId = null;
        let pollingInterval = null;
        
        if (!userPhone) window.location.href = 'login.html';
        
        socket.emit('register-user', userPhone);
        
        socket.on('balance-update', (data) => {
            if (data.newBalance !== undefined) {
                balance = data.newBalance;
                localStorage.setItem('userBalance', balance);
                updateBalanceDisplay();
            }
        });
        
        async function loadBalance() {
            try {
                const res = await fetch(`/wallet/${userPhone}`);
                const data = await res.json();
                if (data.balance !== undefined) {
                    balance = data.balance;
                    localStorage.setItem('userBalance', balance);
                    updateBalanceDisplay();
                }
            } catch(e) { console.error('Balance error:', e); }
        }
        
        function updateBalanceDisplay() {
            const el = document.getElementById('balance');
            el.classList.add('balance-update');
            el.textContent = `$${balance.toFixed(2)}`;
            setTimeout(() => el.classList.remove('balance-update'), 300);
        }
        
        function showToast(message, isWin) {
            const toast = document.createElement('div');
            toast.className = isWin ? 'toast-win' : 'toast-loss';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function updateTotal() {
            const total = bets.reduce((s, b) => s + b.amount, 0);
            document.getElementById('totalWagered').textContent = `$${total.toFixed(2)}`;
            document.getElementById('totalDisplay').innerHTML = `Total: $${total.toFixed(2)}`;
            document.getElementById('betCount').textContent = bets.length;
        }
        
        function renderBets() {
            const container = document.getElementById('betsList');
            if (bets.length === 0) {
                container.innerHTML = '<div class="text-center text-muted">No bets yet</div>';
                return;
            }
            container.innerHTML = bets.map((bet, i) => `
                <div class="bet-item" data-idx="${i}">
                    <button class="remove-bet" data-idx="${i}">✖</button>
                    <span class="bet-numbers">🎲 ${bet.numbers.join(', ')}</span><br>
                    <span class="bet-amount">$${bet.amount.toFixed(2)}</span>
                    <div class="bet-result" id="bet-result-${i}">⏳ Pending...</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.remove-bet').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.idx);
                    if (!canBet) { alert('Cannot remove - betting closed!'); return; }
                    bets.splice(idx, 1);
                    updateTotal();
                    renderBets();
                };
            });
        }
        
        function clearAllBets() {
            if (!canBet) { alert('Cannot clear - betting closed!'); return; }
            bets = [];
            updateTotal();
            renderBets();
            clearSelection();
        }
        
        function createNumberGrid() {
            const grid = document.getElementById('numbersGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 80; i++) {
                const btn = document.createElement('button');
                btn.className = 'number';
                btn.textContent = i;
                btn.dataset.num = i;
                btn.onclick = () => toggleNumber(i, btn);
                grid.appendChild(btn);
            }
        }
        
        function toggleNumber(num, btn) {
            if (!canBet) { alert('Betting closed!'); return; }
            const idx = selectedNumbers.indexOf(num);
            if (idx === -1) {
                if (selectedNumbers.length >= 10) { alert('Max 10 numbers!'); return; }
                selectedNumbers.push(num);
                btn.classList.add('selected');
            } else {
                selectedNumbers.splice(idx, 1);
                btn.classList.remove('selected');
            }
            document.getElementById('selectedCount').textContent = selectedNumbers.length;
        }
        
        function clearSelection() {
            selectedNumbers = [];
            document.querySelectorAll('.number').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('selectedCount').textContent = '0';
        }
        
        function resetGrid() {
            document.querySelectorAll('.number').forEach(btn => btn.classList.remove('drawn', 'matched', 'selected'));
        }
        
        document.getElementById('addBetBtn').onclick = () => {
            if (!canBet) { alert('Betting closed!'); return; }
            const amount = parseFloat(document.getElementById('betAmount').value);
            if (selectedNumbers.length === 0) { alert('Select numbers!'); return; }
            if (isNaN(amount) || amount <= 0) { alert('Enter valid amount!'); return; }
            
            const total = bets.reduce((s, b) => s + b.amount, 0);
            if (total + amount > balance) { alert(`Insufficient balance! Available: $${(balance - total).toFixed(2)}`); return; }
            
            bets.push({ numbers: [...selectedNumbers], amount });
            updateTotal();
            renderBets();
            clearSelection();
        };
        
        document.getElementById('clearBtn').onclick = clearAllBets;
        
        document.getElementById('minusBtn').onclick = () => {
            let v = parseFloat(document.getElementById('betAmount').value);
            if (v > 1) document.getElementById('betAmount').value = v - 1;
        };
        document.getElementById('plusBtn').onclick = () => {
            let v = parseFloat(document.getElementById('betAmount').value);
            document.getElementById('betAmount').value = v + 1;
        };
        
        let lastTimeLeft = 30;
        function updateTimer(timeLeft) {
            if (timeLeft !== lastTimeLeft) {
                document.getElementById('timer').style.transform = 'scale(1.05)';
                setTimeout(() => document.getElementById('timer').style.transform = '', 100);
                lastTimeLeft = timeLeft;
            }
            document.getElementById('timer').textContent = timeLeft + 's';
            const percent = (timeLeft / 30) * 100;
            document.getElementById('timerProgress').style.width = Math.max(0, percent) + '%';
        }
        
        async function animateNumbers(numbers) {
            for (let i = 0; i < numbers.length; i++) {
                const num = numbers[i];
                const isMatch = bets.some(b => b.numbers.includes(num));
                
                const div = document.createElement('div');
                div.className = `drawing-number ${isMatch ? 'matched' : ''}`;
                div.textContent = num;
                document.body.appendChild(div);
                
                const btn = document.querySelector(`.number[data-num="${num}"]`);
                if (btn) {
                    btn.classList.add('drawn');
                    if (isMatch) btn.classList.add('matched');
                }
                
                document.getElementById('status').innerHTML = `🎲 Drawing ${i+1}/${numbers.length}...`;
                await new Promise(r => setTimeout(r, 600));
                div.remove();
                await new Promise(r => setTimeout(r, 100));
            }
        }
        
        async function submitBets() {
            if (bets.length === 0) return;
            document.getElementById('status').innerHTML = '<span class="spinner-border spinner-border-sm"></span> Placing bets...';
            
            for (const bet of bets) {
                try {
                    const res = await fetch('/keno/bet', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: { phone: userPhone, selectedNumbers: bet.numbers, betAmount: bet.amount }
                    });
                    const data = await res.json();
                    if (data.success) {
                        balance = data.newBalance;
                        localStorage.setItem('userBalance', balance);
                        updateBalanceDisplay();
                    }
                } catch(e) { console.error('Bet error:', e); }
            }
            document.getElementById('status').innerHTML = '✅ Bets placed! Watching draw...';
        }
        
        async function fetchResults(gameId, drawnNumbers) {
            try {
                const res = await fetch(`/keno/history/${userPhone}`);
                const history = await res.json();
                const roundBets = history.filter(h => h.game_id === gameId);
                const totalBet = bets.reduce((s, b) => s + b.amount, 0);
                const totalWin = roundBets.reduce((s, b) => s + (b.win_amount || 0), 0);
                
                bets.forEach((bet, idx) => {
                    const normalizedBet = [...bet.numbers].sort((a,b)=>a-b).join(',');
                    const match = roundBets.find(r => {
                        if (!r.selected_numbers) return false;
                        return [...r.selected_numbers].sort((a,b)=>a-b).join(',') === normalizedBet;
                    });
                    const resultDiv = document.getElementById(`bet-result-${idx}`);
                    if (match && match.win_amount > 0) {
                        resultDiv.innerHTML = `🏆 WON: +$${match.win_amount.toFixed(2)}`;
                        resultDiv.className = 'bet-result win';
                        document.querySelector(`.bet-item[data-idx="${idx}"]`).classList.add('won');
                    } else if (match) {
                        resultDiv.innerHTML = `💸 LOST: -$${bet.amount.toFixed(2)}`;
                        resultDiv.className = 'bet-result loss';
                        document.querySelector(`.bet-item[data-idx="${idx}"]`).classList.add('lost');
                    }
                });
                
                const resultsBar = document.getElementById('resultsBar');
                const netResult = totalWin - totalBet;
                document.getElementById('resultsContent').innerHTML = `
                    <div style="flex:1">
                        <div class="results-numbers">🎲 ${drawnNumbers.join(', ')}</div>
                        <div style="font-size:0.65rem;">${gameId}</div>
                    </div>
                    <div>
                        <div class="${totalWin > 0 ? 'results-win' : 'results-lose'}">
                            ${totalWin > 0 ? `🏆 WON: +$${totalWin.toFixed(2)}` : `😢 LOST: -$${totalBet.toFixed(2)}`}
                        </div>
                        <div style="font-size:0.7rem;">Net: ${netResult >= 0 ? '+' : ''}$${netResult.toFixed(2)}</div>
                    </div>
                `;
                resultsBar.classList.add('show');
                showToast(totalWin > 0 ? `🎉 YOU WON! +$${totalWin.toFixed(2)}` : `😢 YOU LOST! -$${totalBet.toFixed(2)}`, totalWin > 0);
                
                await loadBalance();
                
                setTimeout(() => {
                    resultsBar.classList.remove('show');
                    bets = [];
                    updateTotal();
                    renderBets();
                    clearSelection();
                    resetGrid();
                }, 5000);
            } catch(e) { console.error('Results error:', e); }
        }
        
        async function pollGameState() {
            try {
                const res = await fetch('/keno/state');
                const state = await res.json();
                if (!state.success) return;
                
                if (currentGameId !== state.gameId) {
                    currentGameId = state.gameId;
                    document.getElementById('gameId').textContent = state.gameId;
                }
                
                updateTimer(state.timeLeft);
                
                if (state.phase === 'betting') {
                    canBet = true;
                    document.getElementById('phaseLabel').innerHTML = '⏱️ BETTING WINDOW';
                    document.getElementById('status').innerHTML = 'Select numbers and add your bets!';
                    document.getElementById('status').style.color = '#ffc107';
                }
                else if (state.phase === 'drawing') {
                    canBet = false;
                    document.getElementById('phaseLabel').innerHTML = '🎲 DRAWING NUMBERS';
                    document.getElementById('status').innerHTML = 'Numbers being drawn...';
                    document.getElementById('status').style.color = '#ff9800';
                    
                    if (bets.length > 0 && !window.betsSubmitted) {
                        window.betsSubmitted = true;
                        await submitBets();
                    }
                    
                    if (state.drawnNumbers && !window.numbersShown) {
                        window.numbersShown = true;
                        await animateNumbers(state.drawnNumbers);
                    }
                }
                else if (state.phase === 'results') {
                    canBet = false;
                    document.getElementById('phaseLabel').innerHTML = '📊 RESULTS';
                    document.getElementById('status').innerHTML = 'Round complete!';
                    document.getElementById('status').style.color = '#28a745';
                    
                    if (state.drawnNumbers && !window.resultsShown) {
                        window.resultsShown = true;
                        await fetchResults(state.gameId, state.drawnNumbers);
                        window.betsSubmitted = false;
                        window.numbersShown = false;
                        window.resultsShown = false;
                    }
                }
            } catch(e) { console.error('Poll error:', e); }
        }
        
        function refreshBalance() { loadBalance(); }
        function closeResultsBar() { document.getElementById('resultsBar').classList.remove('show'); }
        
        createNumberGrid();
        loadBalance();
        updateTotal();
        renderBets();
        
        pollingInterval = setInterval(pollGameState, 500);
        setInterval(loadBalance, 5000);
        
        window.refreshBalance = refreshBalance;
        window.closeResultsBar = closeResultsBar;
    </script>
</body>
</html>
