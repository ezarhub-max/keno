<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KENO — Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f;
  --surface: #0d1117;
  --border: #1e2730;
  --cyan: #00e5ff;
  --green: #00e676;
  --red: #ff1744;
  --text: #e2e8f0;
  --font-mono: 'JetBrains Mono', monospace;
  --font-head: 'Syne', sans-serif;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.maintenance-container {
  max-width: 450px;
  width: 100%;
  text-align: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.maintenance-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 40px 30px;
  backdrop-filter: blur(10px);
}

.icon {
  font-size: 4.5rem;
  margin-bottom: 20px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

.title {
  font-family: var(--font-head);
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--red);
  margin-bottom: 15px;
  letter-spacing: -0.5px;
}

.message {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.7);
  margin-bottom: 25px;
  line-height: 1.6;
}

.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  margin: 20px auto;
}

.info-text {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.5);
  margin-bottom: 12px;
}

.retry-btn {
  background: linear-gradient(135deg, var(--cyan), #0091ea);
  border: none;
  border-radius: 40px;
  padding: 14px 28px;
  color: #000;
  font-weight: 800;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  font-family: var(--font-mono);
  margin-top: 10px;
}

.retry-btn:active {
  transform: scale(0.97);
}

.home-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 12px 28px;
  color: white;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  font-family: var(--font-mono);
  margin-top: 10px;
  text-decoration: none;
  display: inline-block;
}

.home-btn:active {
  transform: scale(0.97);
  background: rgba(255,255,255,0.15);
}

.status-badge {
  display: inline-block;
  background: rgba(255,23,68,0.15);
  border: 1px solid rgba(255,23,68,0.3);
  border-radius: 50px;
  padding: 5px 15px;
  font-size: 0.7rem;
  color: var(--red);
  margin-bottom: 20px;
}

.logo {
  font-family: var(--font-head);
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--cyan);
  margin-bottom: 20px;
  letter-spacing: 0.1em;
}

.logo span {
  color: #ffb300;
}

@media (max-width: 480px) {
  .maintenance-card { padding: 30px 20px; }
  .title { font-size: 1.4rem; }
  .icon { font-size: 3.5rem; }
}
</style>
</head>
<body>
<div class="maintenance-container">
  <div class="maintenance-card">
    <div class="logo">KE<span>NO</span></div>
    <div class="icon">🔧</div>
    <div class="title">Come Back Later</div>
    <div class="status-badge">⚠️ MAINTENANCE MODE</div>
    <div class="message">
      We're currently updating the game server.<br>
      Fixing some logic to make your experience better.
    </div>
    <div class="divider"></div>
    <div class="info-text">
      <i class="fas fa-clock"></i> Expected to be back shortly
    </div>
    <button class="retry-btn" onclick="checkServer()">
      🔄 Check Again
    </button>
    <a href="/" class="home-btn">
      🏠 Go to Home
    </a>
  </div>
</div>

<script>
function checkServer() {
  const btn = event.target;
  const originalText = btn.innerHTML;
  btn.innerHTML = '<span class="loading"></span> Checking...';
  btn.disabled = true;
  
  fetch('/test')
    .then(response => {
      if (response.ok) {
        window.location.reload();
      } else {
        throw new Error('Server not ready');
      }
    })
    .catch(() => {
      btn.innerHTML = originalText;
      btn.disabled = false;
      alert('Server is still under maintenance. Please try again later.');
    });
}

// Auto refresh every 30 seconds
setInterval(() => {
  fetch('/test')
    .then(res => {
      if (res.ok) window.location.reload();
    })
    .catch(() => {});
}, 30000);
</script>
</body>
</html>
