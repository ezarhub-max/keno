<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        .admin-nav {
            background: #2c3e50;
            padding: 10px 0;
        }
        .admin-nav a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            margin: 0 5px;
            border-radius: 20px;
        }
        .admin-nav a:hover {
            background: #34495e;
        }
        .admin-nav a.active {
            background: #3498db;
        }
        .next-game-bar {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #28a745;
            font-size: 0.9rem;
        }
        .next-game-time {
            font-weight: bold;
            color: #28a745;
            font-size: 1.2rem;
        }
        .progress-sm {
            height: 4px;
        }
        .game-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid #eee;
        }
        .game-id {
            background: #2c3e50;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .live-badge {
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        .finished-badge {
            background: #27ae60;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        .winner-tag {
            background: #f1c40f;
            color: #2c3e50;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .horse-row {
            display: flex;
            gap: 3px;
            margin-top: 5px;
        }
        .horse-item {
            flex: 1;
            background: #f8f9fa;
            border-radius: 4px;
            padding: 5px 2px;
            text-align: center;
            font-size: 0.7rem;
            border: 1px solid #dee2e6;
        }
        .horse-item.winner {
            background: #fff3cd;
            border-color: #f1c40f;
        }
        .horse-icon {
            font-size: 1rem;
        }
        .horse-number {
            font-weight: bold;
        }
        .bet-amount {
            color: #27ae60;
            font-weight: bold;
            font-size: 0.7rem;
        }
        .percentage {
            color: #3498db;
            font-size: 0.65rem;
        }
        .progress-xs {
            height: 2px;
            margin-top: 2px;
        }
        .total-bets {
            text-align: right;
            font-size: 0.7rem;
            color: #7f8c8d;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px dashed #dee2e6;
        }
        .games-list {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        .games-list::-webkit-scrollbar {
            width: 4px;
        }
        .games-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }
        .special-draw {
            background: #dc3545;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.6rem;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="admin-nav">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <span style="color: white; font-weight: bold;">👑 Admin</span>
                <div>
                    <a href="admin-bets.html" class="active">Games</a>
                    <a href="admin-members.html">Members</a>
                    <a href="admin-withdrawals.html">Withdrawals</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-3">
        <div class="next-game-bar">
            <div class="row align-items-center g-2">
                <div class="col-auto">
                    <span class="next-game-time" id="nextGameCountdown">60s</span>
                </div>
                <div class="col">
                    <div class="progress progress-sm">
                        <div class="progress-bar" id="nextGameProgress" style="width: 100%"></div>
                    </div>
                </div>
                <div class="col-auto">
                    <small class="text-muted" id="nextGameId">GAME-000000</small>
                </div>
            </div>
        </div>

        <div class="games-list" id="gamesContainer">
            <div class="text-center text-muted">Loading games...</div>
        </div>
    </div>

    <script>
        const socket = io();
        let gameSessions = new Map();
        let nextRaceTime = null;
        let countdownInterval;

        function calculateNextRaceTime() {
            return Math.ceil(Date.now() / 60000) * 60000;
        }

        function updateNextGameCountdown() {
            if (!nextRaceTime) nextRaceTime = calculateNextRaceTime();
            
            const now = Date.now();
            const timeLeft = Math.max(0, Math.ceil((nextRaceTime - now) / 1000));
            const gameId = `GAME-${Math.floor(nextRaceTime / 1000).toString().slice(-6)}`;
            
            document.getElementById('nextGameCountdown').textContent = timeLeft + 's';
            document.getElementById('nextGameId').textContent = gameId;
            
            const progressPercent = (timeLeft / 60) * 100;
            const progressBar = document.getElementById('nextGameProgress');
            progressBar.style.width = `${progressPercent}%`;
            
            if (timeLeft <= 10) progressBar.className = 'progress-bar bg-danger';
            else if (timeLeft <= 30) progressBar.className = 'progress-bar bg-warning';
            else progressBar.className = 'progress-bar bg-success';
            
            if (timeLeft === 0) {
                nextRaceTime = calculateNextRaceTime();
                createNewGameSession(gameId);
            }
        }

        function createNewGameSession(gameId) {
            if (!gameSessions.has(gameId)) {
                gameSessions.set(gameId, {
                    id: gameId,
                    startTime: Date.now(),
                    status: 'racing',
                    winningHorse: null,
                    horses: Array(6).fill(0).map((_, i) => ({
                        number: i + 1,
                        total: 0
                    }))
                });
            }
        }

        function loadBets() {
            fetch('/admin/bets')
                .then(res => res.json())
                .then(data => {
                    const currentGameId = `GAME-${Math.floor(Date.now() / 60000).toString().slice(-6)}`;
                    updateGameSessions(currentGameId, data);
                    displayGameSessions();
                })
                .catch(console.error);
        }

        function updateGameSessions(currentGameId, horseData) {
            const now = Date.now();
            
            if (!gameSessions.has(currentGameId)) {
                gameSessions.set(currentGameId, {
                    id: currentGameId,
                    startTime: Math.floor(now / 60000) * 60000,
                    status: 'racing',
                    winningHorse: null,
                    horses: horseData
                });
            } else {
                gameSessions.get(currentGameId).horses = horseData;
            }
            
            gameSessions.forEach((game, id) => {
                if (game.status === 'racing' && id !== currentGameId) {
                    game.status = 'finished';
                    if (!game.winningHorse) {
                        const gameNumber = parseInt(id.split('-')[1]) || 0;
                        // If game number is divisible by 5, winner is horse 66 or 14 based logic
                        if (gameNumber % 5 === 0) {
                            game.winningHorse = Math.random() < 0.5 ? 6 : 1; // Example special logic
                        } else {
                            game.winningHorse = Math.floor(Math.random() * 6) + 1;
                        }
                    }
                }
            });
            
            const sorted = Array.from(gameSessions.entries())
                .sort((a, b) => b[1].startTime - a[1].startTime);
            
            if (sorted.length > 20) {
                sorted.slice(20).forEach(([id]) => gameSessions.delete(id));
            }
        }

        function displayGameSessions() {
            const container = document.getElementById('gamesContainer');
            container.innerHTML = '';
            
            const sortedGames = Array.from(gameSessions.entries())
                .sort((a, b) => b[1].startTime - a[1].startTime);
            
            sortedGames.forEach(([_, game]) => {
                container.appendChild(createGameCard(game));
            });
        }

        function createGameCard(game) {
            const div = document.createElement('div');
            div.className = 'game-card';
            
            const totalBets = game.horses.reduce((sum, h) => sum + h.total, 0);
            const gameTime = new Date(game.startTime).toLocaleTimeString();
            const isLive = game.status === 'racing';
            
            const gameNumber = parseInt(game.id.split('-')[1]) || 0;
            const isSpecial = gameNumber % 5 === 0;
            
            let horsesHtml = '';
            game.horses.forEach(horse => {
                const percentage = totalBets > 0 ? (horse.total / totalBets * 100) : 0;
                const isWinner = game.winningHorse === horse.number;
                
                horsesHtml += `
                    <div class="horse-item ${isWinner ? 'winner' : ''}">
                        <div class="horse-icon">🐎</div>
                        <div class="horse-number">H${horse.number}</div>
                        <div class="bet-amount">$${horse.total.toFixed(0)}</div>
                        <div class="percentage">${percentage.toFixed(0)}%</div>
                        <div class="progress progress-xs">
                            <div class="progress-bar ${isWinner ? 'bg-warning' : 'bg-success'}" 
                                 style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            });
            
            div.innerHTML = `
                <div class="game-header">
                    <div>
                        <span class="game-id">${game.id}</span>
                        ${isSpecial ? '<span class="special-draw">✨ SPECIAL (66,14)</span>' : ''}
                        ${isLive ? '<span class="live-badge">LIVE</span>' : '<span class="finished-badge">END</span>'}
                    </div>
                    <div>
                        ${game.winningHorse ? `<span class="winner-tag">🏆 H${game.winningHorse}</span>` : ''}
                        <small class="text-muted ms-2">${gameTime}</small>
                    </div>
                </div>
                <div class="horse-row">
                    ${horsesHtml}
                </div>
                <div class="total-bets">
                    Total: $${totalBets.toFixed(0)}
                </div>
            `;
            
            return div;
        }

        nextRaceTime = calculateNextRaceTime();
        countdownInterval = setInterval(updateNextGameCountdown, 100);
        
        loadBets();
        setInterval(loadBets, 3000);

        if (!localStorage.getItem('adminAuth')) {
            window.location.href = 'admin-login.html';
        }

        window.addEventListener('beforeunload', () => {
            clearInterval(countdownInterval);
        });
    </script>
</body>
</html>
